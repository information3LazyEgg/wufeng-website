<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>霧峰旅遊宣傳網 | Wufeng Travel</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- 導覽列 -->
    <div id="site-header"></div>

    <!-- 輪播圖 -->
    <section class="carousel-section">
        <div class="carousel">
            <div class="carousel-inner" id="carouselInner">
                <div class="carousel-item active">
                    <img src="Website Materials/Image/Carousel 01.jpg" alt="霧峰風景 1">
                    <div class="carousel-caption">
                        <h2>探索霧峰之美</h2>
                        <p>走進歷史、文化與自然交織的城鎮</p>
                    </div>
                </div>
                <div class="carousel-item">
                    <img src="Website Materials/Image/Carousel 02.jpg" alt="霧峰風景 2">
                    <div class="carousel-caption">
                        <h2>人文薈萃之地</h2>
                        <p>感受百年文化的底蘊與魅力</p>
                    </div>
                </div>
                <div class="carousel-item">
                    <img src="Website Materials/Image/Carousel 03.jpg" alt="霧峰風景 3">
                    <div class="carousel-caption">
                        <h2>景色宜人</h2>
                        <p>漫步在綠意盎然的街道巷弄</p>
                    </div>
                </div>
                <div class="carousel-item">
                    <img src="Website Materials/Image/Carousel 04.jpg" alt="霧峰風景 4">
                    <div class="carousel-caption">
                        <h2>傳統與現代交融</h2>
                        <p>體驗霧峰的創新與活力</p>
                    </div>
                </div>
            </div>
            <button class="carousel-control prev" id="carouselPrev">&#10094;</button>
            <button class="carousel-control next" id="carouselNext">&#10095;</button>
            <div class="carousel-indicators" id="carouselIndicators"></div>
        </div>
    </section>

    <!-- 文章快速導覽區 -->
    <section class="quick-nav">
        <div class="container">
            <h2 class="section-title">探索霧峰</h2>
            <div class="quick-nav-grid">
                <a href="about.html" class="quick-nav-card">
                    <div class="quick-nav-icon">📖</div>
                    <h3>網站介紹</h3>
                    <p>了解本站的創建理念與目的</p>
                </a>
                <a href="attractions.html" class="quick-nav-card">
                    <div class="quick-nav-icon">🗺️</div>
                    <h3>景點導覽</h3>
                    <p>走訪霧峰的歷史文化景點</p>
                </a>
                <a href="activities.html" class="quick-nav-card">
                    <div class="quick-nav-icon">🎡</div>
                    <h3>樂遊活動</h3>
                    <p>參與精彩豐富的在地活動</p>
                </a>
                <a href="food.html" class="quick-nav-card">
                    <div class="quick-nav-icon">🍜</div>
                    <h3>美食推薦</h3>
                    <p>品嚐霧峰的傳統美味佳餚</p>
                </a>
                <a href="timeline.html" class="quick-nav-card">
                    <div class="quick-nav-icon">🕰️</div>
                    <h3>時光走廊</h3>
                    <p>探索霧峰的歷史發展軌跡</p>
                </a>
            </div>
        </div>
    </section>

    <!-- 音樂欣賞區 -->
    <section class="music-section">
        <div class="container">
            <h2 class="section-title">阿罩霧之歌</h2>
            <p class="music-description">聆聽屬於霧峰的在地旋律</p>
            <div class="video-container">
                <video controls poster="Website Materials/Image/Carousel 01.jpg">
                    <source src="Website Materials/video/阿罩霧之歌 - 2012秋田享樂活動專用版MV - 林惇誠 (720p, h264, youtube).mp4" type="video/mp4">
                    您的瀏覽器不支援 video 標籤。
                </video>
            </div>
        </div>
    </section>

    <!-- 頁尾 -->
    <div id="site-footer"></div>
    <script src="js/includes.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
